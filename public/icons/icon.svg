    <rect x="35" y="10" width="30" height="28" rx="4" fill="#0B2E28" opacity="0.85"/>
    <rect x="-62" y="15" width="24" height="18" rx="2" fill="#E1EDE8" opacity="0.3"/>
    <rect x="38" y="15" width="24" height="18" rx="2" fill="#E1EDE8" opacity="0.3"/>
    <!-- window dividers -->
