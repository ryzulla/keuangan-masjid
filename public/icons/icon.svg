    <line x1="-65" y1="24" x2="-35" y2="24" stroke="#164A40" stroke-width="2" opacity="0.4"/>
    <line x1="50" y1="10" x2="50" y2="38" stroke="#164A40" stroke-width="2" opacity="0.4"/>
